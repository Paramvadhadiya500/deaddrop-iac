service: deaddrop-iac
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:*
          Resource:
            - !GetAtt DeadDropTableV2.Arn
        - Effect: Allow
          Action:
            - s3:*
          Resource:
            - arn:aws:s3:::secret-sharer-files-param-123
            - arn:aws:s3:::secret-sharer-files-param-123/*

functions:
  # Notice we changed "httpApi" to "http" to unlock the Enterprise REST API!
  initiateUpload:
    handler: initiate.handler
    events:
      - http:
          path: v2/initiate
          method: post
          cors: true
  completeUpload:
    handler: complete.handler
    events:
      - http:
          path: v2/complete
          method: post
          cors: true
  readSecret:
    handler: read.handler
    events:
      - http:
          path: v2/read
          method: post
          cors: true

resources:
  Resources:
    # 🗄️ 1. Upgraded DynamoDB Table (Now uses AWS Managed KMS Encryption at rest)
    DeadDropTableV2:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: SecretSharer-v2
        AttributeDefinitions:
          - AttributeName: secretId
            AttributeType: S
        KeySchema:
          - AttributeName: secretId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        SSESpecification:
          SSEEnabled: true # 👈 This single line turns on KMS Hardware Encryption!

    # 🧱 2. AWS WAFv2 (Web Application Firewall)
    DeadDropWAF:
      Type: AWS::WAFv2::WebACL
      Properties:
        Name: DeadDrop-DDoS-Protection
        Scope: REGIONAL
        DefaultAction:
          Allow: {}
        VisibilityConfig:
          CloudWatchMetricsEnabled: true
          MetricName: DeadDropWAF
          SampledRequestsEnabled: true
        Rules:
          - Name: BlockSpamBots
            Priority: 1
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                AggregateKeyType: IP
                Limit: 100 # 👈 Blocks any IP making more than 100 requests in 5 minutes
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: BlockSpamBots
              SampledRequestsEnabled: true

    # 🔗 3. Attach the Firewall to the API Gateway
    WAFAPIAssociation:
      Type: AWS::WAFv2::WebACLAssociation
      Properties:
        ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${ApiGatewayRestApi}/stages/dev"
        WebACLArn: !GetAtt DeadDropWAF.Arn