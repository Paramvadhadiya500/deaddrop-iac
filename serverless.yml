service: deaddrop-v2 # 👈 FIXED: Back to your original master stack name!
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:*
          Resource:
            - !GetAtt DeadDropTableV2.Arn
        - Effect: Allow
          Action:
            - s3:*
          Resource:
            - arn:aws:s3:::secret-sharer-files-param-123
            - arn:aws:s3:::secret-sharer-files-param-123/*

functions:
  initiateUpload:
    handler: initiate.handler
    events:
      - http:
          path: v2/initiate
          method: post
          cors: true
  completeUpload:
    handler: complete.handler
    events:
      - http:
          path: v2/complete
          method: post
          cors: true
  readSecret:
    handler: read.handler
    events:
      - http:
          path: v2/read
          method: post
          cors: true

resources:
  Resources:
    # 🗄️ 1. KMS Encrypted Database
    DeadDropTableV2:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: SecretSharer-v2
        AttributeDefinitions:
          - AttributeName: secretId
            AttributeType: S
        KeySchema:
          - AttributeName: secretId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        SSESpecification:
          SSEEnabled: true # 👈 KMS Hardware Encryption enabled!

    # 🧱 2. AWS WAFv2 Firewall (Built and ready for action)
    DeadDropWAF:
      Type: AWS::WAFv2::WebACL
      Properties:
        Name: DeadDrop-DDoS-Protection
        Scope: REGIONAL
        DefaultAction:
          Allow: {}
        VisibilityConfig:
          CloudWatchMetricsEnabled: true
          MetricName: DeadDropWAF
          SampledRequestsEnabled: true
        Rules:
          - Name: BlockSpamBots
            Priority: 1
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                AggregateKeyType: IP
                Limit: 100 
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: BlockSpamBots
              SampledRequestsEnabled: true